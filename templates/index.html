<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Traffic Analytics System</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            color: #dcdcdc;
        }

        form {
            margin-top: 30px;
        }

        input[type="file"] {
            padding: 12px;
            border-radius: 8px;
            background: white;
            color: black;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .analytics {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            width: 180px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin: 0;
            font-size: 40px;
            color: #00e5ff;
        }

        .card p {
            margin-top: 10px;
            font-size: 18px;
            color: white;
        }

        .result-container {
            margin-top: 40px;
        }

        img {
            width: 85%;
            max-width: 1200px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .footer {
            margin-top: 50px;
            margin-bottom: 20px;
            color: #bbbbbb;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🚦 Traffic Analytics System</h1>

        <p>
            YOLOv8-based intelligent vehicle detection and analytics
        </p>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="image" required>

            <button type="submit">
                Detect Vehicles
            </button>

        </form>

        {% if analytics %}

        <div class="analytics">

            <div class="card">
                <h2>{{ analytics.cars }}</h2>
                <p>Cars</p>
            </div>

            <div class="card">
                <h2>{{ analytics.trucks }}</h2>
                <p>Trucks</p>
            </div>

            <div class="card">
                <h2>{{ analytics.buses }}</h2>
                <p>Buses</p>
            </div>

        </div>

        {% endif %}

        {% if output_image %}

        <div class="result-container">

            <h2>Detection Result</h2>

            <img src="{{ output_image }}" alt="Detected Image">

        </div>

        {% endif %}

        <div class="footer">
            Built using Flask + YOLOv8 + OpenCV
        </div>

    </div>

</body>

</html>
